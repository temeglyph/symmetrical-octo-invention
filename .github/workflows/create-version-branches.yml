name: Build Full AVD x86_64 KernelSU (Android 14)

on:
  workflow_dispatch:
    inputs:
      skip_kernel_build:
        description: 'Skip kernel build (reuse cached artifacts from previous run)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    # Skip this job entirely if we're reusing a previous build
    if: ${{ github.event.inputs.skip_kernel_build != 'true' }}
    steps:
      - name: Save Stock Ramdisk Before Cleanup
        run: |
          echo "=== Searching for stock ramdisk.img in pre-installed Android SDK ==="
          FOUND=""
          for base in "$ANDROID_HOME" "$ANDROID_SDK_ROOT" "/usr/local/lib/android/sdk"; do
            if [ -d "$base/system-images" ]; then
              echo "Searching in: $base/system-images/"
              find "$base/system-images" -name "ramdisk.img" -type f 2>/dev/null | while read f; do
                echo "  Found: $f ($(wc -c < "$f") bytes)"
              done
              for candidate in \
                "$base/system-images/android-34/google_apis/x86_64/ramdisk.img" \
                "$base/system-images/android-34/default/x86_64/ramdisk.img" \
                $(find "$base/system-images" -path "*/x86_64/ramdisk.img" -type f 2>/dev/null | head -3); do
                if [ -f "$candidate" ]; then
                  FOUND="$candidate"
                  break 2
                fi
              done
            fi
          done
          if [ -n "$FOUND" ]; then
            cp "$FOUND" /tmp/stock_ramdisk.img
            echo "✅ Saved stock ramdisk from SDK: $FOUND ($(wc -c < /tmp/stock_ramdisk.img) bytes)"
          else
            echo "⚠️ No stock ramdisk found in pre-installed SDK (will download later)"
          fi

      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y repo git curl bc bison flex libssl-dev libelf-dev cpio lz4 unzip fakeroot

      - name: Initialize & Sync AOSP Kernel
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          git config --global user.name "Builder"
          git config --global user.email "build@example.com"
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
          repo sync -j$(nproc) --no-clone-bundle --no-tags

      - name: Inject Official KernelSU
        run: |
          cd kernel_workspace/common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          sed -i 's/#ifndef X86_FEATURE_INDIRECT_SAFE/#if 0/g' drivers/kernelsu/core/init.c
          sed -i 's/if (!boot_cpu_has(X86_FEATURE_INDIRECT_SAFE))/if (0)/g' drivers/kernelsu/core/init.c

      - name: Compile Native x86_64 Emulator Kernel
        run: |
          cd kernel_workspace
          tools/bazel run //common-modules/virtual-device:virtual_device_x86_64_dist -- --dist_dir=out/dist

      # Upload the raw kernel build as a SEPARATE artifact so it can be reused
      - name: Upload Kernel Build Cache
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-cache
          path: |
            kernel_workspace/out/dist/bzImage
            kernel_workspace/out/dist/initramfs.img
          retention-days: 30

      # Also upload stock ramdisk if we saved one
      - name: Upload Stock Ramdisk Cache
        run: |
          mkdir -p stock_cache
          if [ -f /tmp/stock_ramdisk.img ]; then
            cp /tmp/stock_ramdisk.img stock_cache/
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: stock-ramdisk-cache
          path: stock_cache/
          if-no-files-found: ignore
          retention-days: 30

  # ================================================================
  # JOB 2: Merge ramdisk (runs FAST — uses cached kernel build)
  # ================================================================
  merge-ramdisk:
    runs-on: ubuntu-latest
    needs: build-kernel
    # Always run this job, even if build-kernel was skipped
    if: ${{ always() }}
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cpio lz4 unzip fakeroot kmod

      # Download kernel build artifacts (from this run or previous run)
      - name: Download Kernel Build (Current Run)
        if: ${{ github.event.inputs.skip_kernel_build != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: kernel-build-cache
          path: kernel-build/

      - name: Download Kernel Build (Previous Run)
        if: ${{ github.event.inputs.skip_kernel_build == 'true' }}
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          name: kernel-build-cache
          path: kernel-build/
          search_artifacts: true
          workflow_conclusion: ""

      - name: Verify Kernel Build
        run: |
          echo "=== Kernel Build Artifacts ==="
          ls -la kernel-build/
          if [ ! -f kernel-build/bzImage ] || [ ! -f kernel-build/initramfs.img ]; then
            echo "❌ Missing kernel build artifacts!"
            echo "Run the workflow again with 'Skip kernel build' = false"
            exit 1
          fi
          echo "✅ bzImage: $(wc -c < kernel-build/bzImage) bytes"
          echo "✅ initramfs.img: $(wc -c < kernel-build/initramfs.img) bytes"

      # Download cached stock ramdisk BEFORE we try to use it
      - name: Try Download Stock Ramdisk Cache
        uses: actions/download-artifact@v4
        with:
          name: stock-ramdisk-cache
          path: stock-ramdisk-cache/
        continue-on-error: true

      # Try to get stock ramdisk from cache, then SDK, then download
      - name: Obtain Stock Ramdisk
        run: |
          set -e

          # Try cached stock ramdisk first
          if [ -f stock-ramdisk-cache/stock_ramdisk.img ]; then
            cp stock-ramdisk-cache/stock_ramdisk.img stock_ramdisk.img
            echo "✅ Using cached stock ramdisk: $(wc -c < stock_ramdisk.img) bytes"
            exit 0
          fi

          # Try pre-installed SDK
          for base in "$ANDROID_HOME" "$ANDROID_SDK_ROOT" "/usr/local/lib/android/sdk"; do
            for candidate in \
              "$base/system-images/android-34/google_apis/x86_64/ramdisk.img" \
              "$base/system-images/android-34/default/x86_64/ramdisk.img"; do
              if [ -f "$candidate" ]; then
                cp "$candidate" stock_ramdisk.img
                echo "✅ Using SDK stock ramdisk: $(wc -c < stock_ramdisk.img) bytes"
                exit 0
              fi
            done
          done

          # Download from Google
          echo "Downloading stock ramdisk from Google..."
          mkdir -p stock_work && cd stock_work
          for url in \
            "https://dl.google.com/android/repository/sys-img/google_apis/x86_64-34_r13.zip" \
            "https://dl.google.com/android/repository/sys-img/google_apis/x86_64-34_r12.zip" \
            "https://dl.google.com/android/repository/sys-img/google_apis/x86_64-34_r11.zip"; do
            echo "Trying: $url"
            if curl -fSL -o sysimg.zip "$url" 2>/dev/null; then
              echo "Download successful!"
              break
            fi
          done
          if [ -f sysimg.zip ]; then
            unzip -o sysimg.zip -d extracted/
            STOCK_RAMDISK=$(find extracted/ -name "ramdisk.img" -type f | head -1)
            if [ -n "$STOCK_RAMDISK" ]; then
              cp "$STOCK_RAMDISK" ../stock_ramdisk.img
              echo "✅ Stock ramdisk extracted: $(wc -c < ../stock_ramdisk.img) bytes"
            fi
          fi
          cd ..
          rm -rf stock_work

          if [ ! -f stock_ramdisk.img ]; then
            echo "❌ Could not obtain stock ramdisk!"
            exit 1
          fi

      - name: Merge Kernel Modules into Stock Ramdisk
        run: |

          echo "============================================"
          echo "  FULL DIRECTORY MERGE approach             "
          echo "  (No CPIO concatenation — fixes LZ4 bug)  "
          echo "============================================"
          echo ""

          # --- Step 1: Extract the built initramfs to get .ko files ---
          echo ">>> Step 1: Extracting .ko modules from built initramfs.img..."
          mkdir -p work/built
          cd work/built

          INITRAMFS="../../kernel-build/initramfs.img"
          MAGIC_HEX=$(xxd -l 4 -p "$INITRAMFS")
          echo "    initramfs magic bytes: $MAGIC_HEX"

          if [[ "$MAGIC_HEX" == 04224d18* ]] || [[ "$MAGIC_HEX" == 02214c18* ]]; then
            echo "    Format: LZ4"
            lz4 -dc "$INITRAMFS" | fakeroot cpio -idm --quiet 2>&1 | grep -v "Cannot mknod" || true
          elif [[ "$MAGIC_HEX" == 1f8b* ]]; then
            echo "    Format: gzip"
            gzip -dc "$INITRAMFS" | fakeroot cpio -idm --quiet 2>&1 | grep -v "Cannot mknod" || true
          else
            echo "    Format: unknown, trying lz4..."
            lz4 -dc "$INITRAMFS" 2>/dev/null | fakeroot cpio -idm --quiet 2>/dev/null || true
          fi

          KO_COUNT=$(find . -name "*.ko" | wc -l)
          echo "    Total .ko files extracted: $KO_COUNT"
          if [ "$KO_COUNT" -eq 0 ]; then
            echo "    ❌ No kernel modules in initramfs!"
            exit 1
          fi
          cd ../..

          # --- Step 2: Determine kernel version ---
          echo ""
          echo ">>> Step 2: Determining kernel version..."
          KVER_DIR=$(find work/built/lib/modules -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -n "$KVER_DIR" ]; then
            KVER=$(basename "$KVER_DIR")
            echo "    Kernel version: $KVER"
          else
            FIRST_KO=$(find work/built -name "*.ko" | head -1)
            if [ -n "$FIRST_KO" ]; then
              KVER=$(modinfo -F vermagic "$FIRST_KO" | awk '{print $1}')
              echo "    Kernel version (from modinfo): $KVER"
            else
              echo "    ❌ Cannot determine kernel version!"
              exit 1
            fi
          fi

          # --- Step 3: Extract stock ramdisk into merge directory ---
          echo ""
          echo ">>> Step 3: Extracting stock ramdisk into merge directory..."

          STOCK_MAGIC=$(xxd -l 4 -p stock_ramdisk.img)
          echo "    Stock ramdisk magic: $STOCK_MAGIC"

          # Decompress stock ramdisk to a RAW FILE first (not a pipe!)
          # Piping lz4 | cpio fails because cpio closes the pipe after the
          # first CPIO archive, causing lz4 "Error 70: Write error".
          echo "    Decompressing stock ramdisk to raw file..."
          if [[ "$STOCK_MAGIC" == 04224d18* ]] || [[ "$STOCK_MAGIC" == 02214c18* ]]; then
            lz4 -dc stock_ramdisk.img > stock_raw.cpio 2>/dev/null || true
          elif [[ "$STOCK_MAGIC" == 1f8b* ]]; then
            gzip -dc stock_ramdisk.img > stock_raw.cpio 2>/dev/null || true
          else
            lz4 -dc stock_ramdisk.img > stock_raw.cpio 2>/dev/null || true
          fi
          echo "    Raw CPIO data: $(wc -c < stock_raw.cpio) bytes"

          # Android ramdisks (API 34+) are MULTIPLE concatenated CPIO archives.
          # GNU cpio only extracts the FIRST archive. We use Python to split
          # on TRAILER boundaries and extract every archive.
          mkdir -p merge_root
          echo "    Extracting ALL CPIO archives from stock ramdisk..."
          python3 -c 'import sys, textwrap; exec(textwrap.dedent(sys.stdin.read()))' << 'EXTRACT_CPIOS'
          import subprocess, os

          data = open('stock_raw.cpio', 'rb').read()
          magic = b'070701'
          trailer = b'TRAILER!!!'
          dest = 'merge_root'

          # Find archive boundaries by locating TRAILER markers
          # then finding the next 070701 magic after each
          archive_starts = []
          if data[:6] == magic:
              archive_starts.append(0)

          pos = 0
          while True:
              t = data.find(trailer, pos)
              if t == -1:
                  break
              # After TRAILER!!!, skip padding (null bytes to 4-byte boundary)
              end = t + len(trailer)
              end = (end + 3) & ~3  # align to 4 bytes
              # Look for next CPIO magic
              while end < len(data) and data[end:end+1] == b'\x00':
                  end += 1
              if end < len(data) - 6 and data[end:end+6] == magic:
                  archive_starts.append(end)
              pos = t + len(trailer)

          # Add a sentinel for the end
          archive_ends = archive_starts[1:] + [len(data)]

          print(f'    Found {len(archive_starts)} CPIO archive(s) in stock ramdisk')
          for i, (start, end) in enumerate(zip(archive_starts, archive_ends)):
              chunk = data[start:end]
              proc = subprocess.Popen(
                  ['fakeroot', 'cpio', '-idm', '--quiet', '--no-absolute-filenames'],
                  stdin=subprocess.PIPE, stderr=subprocess.PIPE, cwd=dest
              )
              proc.communicate(input=chunk)
              print(f'    Archive #{i+1}: {end-start} bytes (offset {start})')

          # Show what we got
          total = sum(1 for root, dirs, files in os.walk(dest) for f in files)
          print(f'    Total files in merge_root: {total}')
          EXTRACT_CPIOS

          # Verify critical stock files were extracted
          echo "    Stock ramdisk contents:"
          STOCK_FILE_COUNT=$(find merge_root -type f | wc -l)
          echo "    Total files extracted: $STOCK_FILE_COUNT"
          find merge_root -type f | head -20 | sed 's/^/      /'

          if [ -f merge_root/init ]; then
            echo "    ✅ /init found ($(wc -c < merge_root/init) bytes)"
          else
            echo "    ❌ /init NOT FOUND — stock ramdisk extraction failed!"
            exit 1
          fi

          # Check for fstab in various locations
          FSTAB_FOUND=""
          for fpath in \
            "merge_root/system/etc/ramdisk/fstab.ranchu" \
            "merge_root/first_stage_ramdisk/fstab.ranchu" \
            "merge_root/fstab.ranchu"; do
            if [ -f "$fpath" ]; then
              echo "    ✅ fstab.ranchu found at: $fpath"
              FSTAB_FOUND="$fpath"
              break
            fi
          done
          if [ -z "$FSTAB_FOUND" ]; then
            echo "    ⚠️ fstab.ranchu not found in stock ramdisk (may be in kernel or DT)"
          fi

          # --- Step 4: Copy flattened modules INTO the merge directory ---
          echo ""
          echo ">>> Step 4: Adding kernel modules to merge directory..."

          mkdir -p "merge_root/lib/modules/$KVER"

          echo "    Flattening all .ko files into /lib/modules/$KVER/..."
          find work/built -name "*.ko" -exec cp {} "merge_root/lib/modules/$KVER/" \;
          echo "    .ko files copied: $(find "merge_root/lib/modules/$KVER" -name '*.ko' | wc -l)"

          echo "    Running depmod for kernel $KVER..."
          depmod -a -b merge_root "$KVER"

          for f in modules.dep modules.alias modules.symbols; do
            if [ -f "merge_root/lib/modules/$KVER/$f" ]; then
              echo "    ✅ $f ($(wc -l < "merge_root/lib/modules/$KVER/$f") lines)"
            else
              echo "    ⚠️ $f not generated"
            fi
          done

          echo "    Generating modules.load with correct load order..."
          {
            for m in virtio.ko virtio_ring.ko virtio_pci_modern_dev.ko \
                     virtio_pci_legacy_dev.ko virtio_pci.ko \
                     virtio_blk.ko virtio_net.ko virtio_console.ko \
                     virtio_input.ko virtio_balloon.ko virtio_mmio.ko \
                     virtio-gpu.ko virtio-rng.ko \
                     goldfish_pipe.ko goldfish_address_space.ko \
                     goldfish_sync.ko goldfish_battery.ko mac80211_hwsim.ko; do
              if [ -f "merge_root/lib/modules/$KVER/$m" ]; then
                echo "$m"
              fi
            done
          } > "merge_root/lib/modules/$KVER/modules.load"

          echo "    modules.load entries:"
          cat "merge_root/lib/modules/$KVER/modules.load" | sed 's/^/      /'

          # --- Step 5: Create ONE single CPIO archive and compress ---
          echo ""
          echo ">>> Step 5: Creating SINGLE CPIO archive from merged directory..."
          echo "    (No CPIO concatenation — this avoids the LZ4 TRAILER bug)"

          cd merge_root
          find . | sort | fakeroot cpio -o -H newc --quiet > ../merged.cpio
          cd ..
          echo "    Single CPIO archive: $(wc -c < merged.cpio) bytes"

          echo "    Compressing as LZ4 legacy stream..."
          lz4 -l -12 --favor-decSpeed merged.cpio merged_ramdisk.img
          echo ""

          # --- Verification ---
          echo ">>> Verification: checking final ramdisk contents..."
          FINAL_CONTENTS=$(cpio -t < merged.cpio 2>/dev/null || true)
          ALL_GOOD=true
          for f in "init" "fstab.ranchu" "modules.dep" "modules.alias" "modules.load" \
                   "virtio_pci_modern_dev.ko" "virtio_blk.ko" "virtio_pci.ko"; do
            if echo "$FINAL_CONTENTS" | grep -q "$f"; then
              echo "    ✅ $f FOUND"
            else
              echo "    ❌ $f MISSING"
              ALL_GOOD=false
            fi
          done

          if [ "$ALL_GOOD" = false ]; then
            echo ""
            echo "    ⚠️ Some files are missing! Dumping full archive listing..."
            echo "$FINAL_CONTENTS" | wc -l
            echo "    (Full listing too long, showing first 50 entries:)"
            echo "$FINAL_CONTENTS" | head -50 | sed 's/^/      /'
          fi

          echo ""
          echo "============================================"
          printf "  %-25s %s bytes\n" "Stock ramdisk:" "$(wc -c < stock_ramdisk.img)"
          printf "  %-25s %s bytes\n" "Built initramfs:" "$(wc -c < kernel-build/initramfs.img)"
          printf "  %-25s %s bytes\n" "Single merged CPIO:" "$(wc -c < merged.cpio)"
          printf "  %-25s %s bytes\n" "Final ramdisk (LZ4):" "$(wc -c < merged_ramdisk.img)"
          printf "  %-25s %s bytes\n" "Kernel (bzImage):" "$(wc -c < kernel-build/bzImage)"
          echo "============================================"

      - name: Prepare Final Artifacts
        run: |
          mkdir -p final_output
          cp kernel-build/bzImage final_output/kernel-ranchu
          cp merged_ramdisk.img final_output/ramdisk.img
          cp kernel-build/bzImage final_output/bzImage
          cp kernel-build/initramfs.img final_output/initramfs.img

      - name: Upload Finished Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-avd-x86_64-files
          path: final_output/
