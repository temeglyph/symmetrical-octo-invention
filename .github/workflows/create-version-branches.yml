name: Build Full AVD x86_64 KernelSU (Android 14)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          
      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y repo git curl bc bison flex libssl-dev libelf-dev
          
      - name: Initialize & Sync AOSP Kernel
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          git config --global user.name "Builder"
          git config --global user.email "build@example.com"
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
          repo sync -j$(nproc) --no-clone-bundle --no-tags
          
      - name: Inject Official KernelSU & Fix Compatibility
        run: |
          cd kernel_workspace/common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          # Fix for older Intel CPUs (Prevents bootloop)
          sed -i 's/#ifndef X86_FEATURE_INDIRECT_SAFE/#if 0/g' drivers/kernelsu/core/init.c
          sed -i 's/if (!boot_cpu_has(X86_FEATURE_INDIRECT_SAFE))/if (0)/g' drivers/kernelsu/core/init.c
          # Set a dummy version to stop KernelSU build warnings
          echo "export KSU_GIT_VERSION=$(cd drivers/kernelsu && git rev-parse --short HEAD)" >> $GITHUB_ENV
          
      - name: Force Built-in Drivers (Standalone Fix)
        run: |
          cd kernel_workspace/common/arch/x86/configs/
          # Convert existing virtio modules to built-in drivers
          sed -i 's/CONFIG_VIRTIO_PCI=m/CONFIG_VIRTIO_PCI=y/g' gki_defconfig
          sed -i 's/CONFIG_VIRTIO_BLK=m/CONFIG_VIRTIO_BLK=y/g' gki_defconfig
          sed -i 's/CONFIG_VIRTIO_NET=m/CONFIG_VIRTIO_NET=y/g' gki_defconfig
          sed -i 's/CONFIG_VIRTIO_CONSOLE=m/CONFIG_VIRTIO_CONSOLE=y/g' gki_defconfig
          # Ensure KernelSU is enabled
          echo "CONFIG_KSU=y" >> gki_defconfig
          
      - name: Disable Bazel Integrity Checks (THE KILL-SWITCH)
        run: |
          cd kernel_workspace/common
          # This surgically disables the 'savedefconfig' check inside the build definition
          sed -i 's/check_defconfig = True/check_defconfig = False/g' BUILD.bazel
          
      - name: Compile Kernel Core
        run: |
          cd kernel_workspace
          # Build only the raw kernel binary. This avoids all module/distribution errors.
          tools/bazel build //common:kernel_x86_64
          
      - name: Prepare Artifact
        run: |
          cd kernel_workspace
          # Find the compiled bzImage and move it to the root
          find bazel-bin/common -name bzImage -exec cp {} . \;
          
      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-bzImage
          path: kernel_workspace/bzImage
