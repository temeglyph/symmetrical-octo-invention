name: Build KernelSU LKM

on:
  workflow_dispatch: # Allows you to manually trigger the build with a button

permissions:
  contents: write

jobs:
  build-lkm:
    runs-on: ubuntu-latest
    
    # Loads Ylarod's compiler engine pinned precisely to your emulator's KMI
    container:
      image: ghcr.io/ylarod/ddk-min:android14-6.1
      options: --privileged

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch KernelSU Source
        run: |
          git clone https://github.com/tiann/KernelSU.git
          
      - name: Compile Module
        run: |
          cd KernelSU/kernel
          # Added flags to force compilation of the driver module using Clang
          CONFIG_KSU=m CC=clang make
          
      - name: Upload Finished Module File
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-lkm-artifact
          path: KernelSU/kernel/kernelsu.ko
