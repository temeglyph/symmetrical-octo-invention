name: Build Full AVD x86_64 KernelSU & Ramdisk

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y repo git curl bc bison flex libssl-dev libelf-dev lz4 cpio

      - name: Initialize & Sync AOSP Kernel
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          git config --global user.name "Builder"
          git config --global user.email "build@example.com"
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
          repo sync -j$(nproc) --no-clone-bundle --no-tags

      - name: Inject Official KernelSU
        run: |
          cd kernel_workspace/common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          sed -i 's/#ifndef X86_FEATURE_INDIRECT_SAFE/#if 0/g' drivers/kernelsu/core/init.c
          sed -i 's/if (!boot_cpu_has(X86_FEATURE_INDIRECT_SAFE))/if (0)/g' drivers/kernelsu/core/init.c

      - name: Compile Native x86_64 Emulator Kernel
        run: |
          cd kernel_workspace
          tools/bazel run //common-modules/virtual-device:virtual_device_x86_64_dist -- --dist_dir=out/dist

      - name: Patch Official Ramdisk with New Drivers
        run: |
          # 1. Download the official Google API 34 image directly from Google
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "system-images;android-34;google_apis;x86_64"
          
          mkdir ramdisk_workspace && cd ramdisk_workspace
          
          # 2. Unpack the official Android 14 OS ramdisk
          lz4 -c -d -l $ANDROID_HOME/system-images/android-34/google_apis/x86_64/ramdisk.img | sudo cpio -i
          
          # 3. Inject your newly compiled KernelSU drivers into the OS
          sudo cp ../kernel_workspace/out/dist/*.ko lib/modules/
          
          # 4. Repack the ramdisk perfectly natively
          sudo find . | sudo cpio -o -H newc -R root:root | lz4 -l -12 --favor-decSpeed > ../patched_ramdisk.img

      - name: Upload Finished Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-avd-patched-files
          path: |
            kernel_workspace/out/dist/bzImage
            patched_ramdisk.img
