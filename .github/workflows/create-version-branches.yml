name: Build Full AVD x86_64 KernelSU (Android 14)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      # ============================================================
      # STEP 0: Grab the stock ramdisk BEFORE cleanup deletes the SDK
      # ============================================================
      - name: Save Stock Ramdisk Before Cleanup
        run: |
          echo "=== Searching for stock ramdisk.img in pre-installed Android SDK ==="
          FOUND=""

          # GitHub runners have Android SDK at ANDROID_HOME or /usr/local/lib/android/sdk
          for base in "$ANDROID_HOME" "$ANDROID_SDK_ROOT" "/usr/local/lib/android/sdk"; do
            if [ -d "$base/system-images" ]; then
              echo "Searching in: $base/system-images/"
              find "$base/system-images" -name "ramdisk.img" -type f 2>/dev/null | while read f; do
                echo "  Found: $f ($(wc -c < "$f") bytes)"
              done

              # Prefer API 34 x86_64, but accept any x86_64 ramdisk
              for candidate in \
                "$base/system-images/android-34/google_apis/x86_64/ramdisk.img" \
                "$base/system-images/android-34/default/x86_64/ramdisk.img" \
                $(find "$base/system-images" -path "*/x86_64/ramdisk.img" -type f 2>/dev/null | head -3); do
                if [ -f "$candidate" ]; then
                  FOUND="$candidate"
                  break 2
                fi
              done
            fi
          done

          if [ -n "$FOUND" ]; then
            cp "$FOUND" /tmp/stock_ramdisk.img
            echo "✅ Saved stock ramdisk from SDK: $FOUND ($(wc -c < /tmp/stock_ramdisk.img) bytes)"
          else
            echo "⚠️ No stock ramdisk found in pre-installed SDK (will download later)"
          fi

      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y repo git curl bc bison flex libssl-dev libelf-dev cpio lz4 unzip fakeroot

      - name: Initialize & Sync AOSP Kernel
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          git config --global user.name "Builder"
          git config --global user.email "build@example.com"
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
          repo sync -j$(nproc) --no-clone-bundle --no-tags

      - name: Inject Official KernelSU
        run: |
          cd kernel_workspace/common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          sed -i 's/#ifndef X86_FEATURE_INDIRECT_SAFE/#if 0/g' drivers/kernelsu/core/init.c
          sed -i 's/if (!boot_cpu_has(X86_FEATURE_INDIRECT_SAFE))/if (0)/g' drivers/kernelsu/core/init.c

      - name: Compile Native x86_64 Emulator Kernel
        run: |
          cd kernel_workspace
          tools/bazel run //common-modules/virtual-device:virtual_device_x86_64_dist -- --dist_dir=out/dist

      # ============================================================
      # STEP: Get stock ramdisk (from pre-save or download)
      # ============================================================
      - name: Obtain Stock Ramdisk
        run: |
          set -e

          # Check if we saved it before cleanup
          if [ -f /tmp/stock_ramdisk.img ]; then
            cp /tmp/stock_ramdisk.img stock_ramdisk.img
            echo "✅ Using pre-saved stock ramdisk: $(wc -c < stock_ramdisk.img) bytes"
            exit 0
          fi

          echo "No pre-saved ramdisk. Downloading from Google..."
          mkdir -p stock_work && cd stock_work

          # Try downloading the system image zip
          DOWNLOADED=false
          for url in \
            "https://dl.google.com/android/repository/sys-img/google_apis/x86_64-34_r13.zip" \
            "https://dl.google.com/android/repository/sys-img/google_apis/x86_64-34_r12.zip" \
            "https://dl.google.com/android/repository/sys-img/google_apis/x86_64-34_r11.zip"; do
            echo "Trying: $url"
            if curl -fSL -o sysimg.zip "$url" 2>/dev/null; then
              echo "Download successful! Size: $(wc -c < sysimg.zip) bytes"
              DOWNLOADED=true
              break
            fi
          done

          if [ "$DOWNLOADED" = false ]; then
            echo "❌ All download URLs failed!"
            exit 1
          fi

          # Extract WITHOUT path filters — just unzip everything, then find the file
          echo "Extracting zip (full contents)..."
          unzip -o sysimg.zip -d extracted/
          echo ""
          echo "All files in extracted zip:"
          find extracted/ -type f -name "*.img" | sort
          echo ""

          # Find ramdisk.img
          STOCK_RAMDISK=$(find extracted/ -name "ramdisk.img" -type f | head -1)

          if [ -n "$STOCK_RAMDISK" ] && [ -f "$STOCK_RAMDISK" ]; then
            cp "$STOCK_RAMDISK" ../stock_ramdisk.img
            echo "✅ Stock ramdisk extracted: $STOCK_RAMDISK ($(wc -c < ../stock_ramdisk.img) bytes)"
          else
            echo "❌ ramdisk.img not found in zip!"
            echo "Zip contents:"
            find extracted/ -type f | sort
            exit 1
          fi

          cd ..
          # Clean up the large zip to free disk space
          rm -rf stock_work

      # ============================================================
      # STEP: Merge kernel modules into stock ramdisk
      # ============================================================
      - name: Merge Kernel Modules into Stock Ramdisk
        run: |

          echo "============================================"
          echo "  Merging custom kernel modules into stock  "
          echo "  Android ramdisk for emulator boot         "
          echo "============================================"
          echo ""

          # --- Step 1: Extract the built initramfs (contains .ko modules) ---
          echo ">>> Step 1: Extracting built initramfs.img..."
          mkdir -p work/built
          cd work/built

          INITRAMFS="../../kernel_workspace/out/dist/initramfs.img"

          # Detect compression and extract
          MAGIC_HEX=$(xxd -l 4 -p "$INITRAMFS")
          echo "    initramfs magic bytes: $MAGIC_HEX"

          if [[ "$MAGIC_HEX" == 04224d18* ]] || [[ "$MAGIC_HEX" == 02214c18* ]]; then
            echo "    Format: LZ4"
            lz4 -dc "$INITRAMFS" | fakeroot cpio -idm --quiet 2>&1 | grep -v "Cannot mknod" || true
          elif [[ "$MAGIC_HEX" == 1f8b* ]]; then
            echo "    Format: gzip"
            gzip -dc "$INITRAMFS" | fakeroot cpio -idm --quiet 2>&1 | grep -v "Cannot mknod" || true
          elif [[ "$MAGIC_HEX" == 28b52ffd* ]]; then
            echo "    Format: zstd"
            zstd -dc "$INITRAMFS" | fakeroot cpio -idm --quiet 2>&1 | grep -v "Cannot mknod" || true
          elif [[ "$MAGIC_HEX" == 30373037* ]]; then
            echo "    Format: raw cpio"
            fakeroot cpio -idm --quiet < "$INITRAMFS" 2>&1 | grep -v "Cannot mknod" || true
          else
            echo "    Format: unknown ($MAGIC_HEX), trying all decompressors..."
            lz4 -dc "$INITRAMFS" 2>/dev/null | fakeroot cpio -idm --quiet 2>/dev/null || \
            gzip -dc "$INITRAMFS" 2>/dev/null | fakeroot cpio -idm --quiet 2>/dev/null || \
            fakeroot cpio -idm --quiet < "$INITRAMFS" 2>/dev/null || true
          fi

          echo "    Kernel modules found:"
          find . -name "*.ko" | sort | sed 's/^/      /'
          KO_COUNT=$(find . -name "*.ko" | wc -l)
          echo "    Total .ko files: $KO_COUNT"

          if [ "$KO_COUNT" -eq 0 ]; then
            echo "    ❌ No kernel modules in initramfs!"
            echo "    Full contents:"
            find . -type f | sort | sed 's/^/      /'
            exit 1
          fi
          cd ../..

          # --- Step 2: Extract the stock ramdisk (contains Android init) ---
          echo ""
          echo ">>> Step 2: Extracting stock ramdisk.img..."
          mkdir -p work/stock
          cd work/stock

          STOCK="../../stock_ramdisk.img"
          STOCK_MAGIC=$(xxd -l 4 -p "$STOCK")
          echo "    Magic bytes: $STOCK_MAGIC"

          REPACK_FORMAT="lz4"
          if [[ "$STOCK_MAGIC" == 04224d18* ]] || [[ "$STOCK_MAGIC" == 02214c18* ]]; then
            lz4 -dc "$STOCK" | fakeroot cpio -idm --quiet 2>&1 | grep -v "Cannot mknod" || true
            REPACK_FORMAT="lz4"
          elif [[ "$STOCK_MAGIC" == 1f8b* ]]; then
            gzip -dc "$STOCK" | fakeroot cpio -idm --quiet 2>&1 | grep -v "Cannot mknod" || true
            REPACK_FORMAT="gzip"
          else
            lz4 -dc "$STOCK" 2>/dev/null | fakeroot cpio -idm --quiet 2>/dev/null || \
            gzip -dc "$STOCK" 2>/dev/null | fakeroot cpio -idm --quiet 2>/dev/null || \
            fakeroot cpio -idm --quiet < "$STOCK" 2>/dev/null || true
          fi

          echo "    Stock ramdisk contents:"
          ls -la | sed 's/^/      /'
          echo "    /init present: $([ -f init ] && echo 'YES ✅' || echo 'NO ❌')"
          echo "    /lib/modules exists: $([ -d lib/modules ] && echo 'YES' || echo 'NO (will create)')"
          cd ../..

          # --- Step 3: Merge ---
          echo ""
          echo ">>> Step 3: Merging modules into stock ramdisk..."
          mkdir -p work/merged

          # Copy stock ramdisk as base (preserves Android's init)
          cp -a work/stock/. work/merged/

          # Copy the ENTIRE /lib/modules tree from built initramfs, preserving structure
          # first_stage_init expects: /lib/modules/<kernel_version>/*.ko + modules.load
          if [ -d work/built/lib/modules ]; then
            echo "    Copying entire /lib/modules tree (preserving kernel version directory)..."
            cp -a work/built/lib/modules/. work/merged/lib/modules/
            echo "    Module tree structure:"
            find work/merged/lib/modules -type f | head -20 | sed 's/^/      /'
            echo "      ... ($(find work/merged/lib/modules -name '*.ko' | wc -l) total .ko files)"
          else
            echo "    ⚠️ No /lib/modules in built initramfs, copying flat..."
            mkdir -p work/merged/lib/modules
            find work/built -name "*.ko" -exec cp {} work/merged/lib/modules/ \;
          fi

          # Find the kernel version directory
          KVER_DIR=$(find work/merged/lib/modules -mindepth 1 -maxdepth 1 -type d | head -1)
          echo "    Kernel version dir: $KVER_DIR"

          # If modules.load doesn't exist in the kernel version dir, generate one
          if [ -n "$KVER_DIR" ] && [ ! -f "$KVER_DIR/modules.load" ]; then
            echo "    Generating modules.load in $KVER_DIR..."
            {
              # VirtIO core must load first
              for m in virtio.ko virtio_ring.ko; do
                find "$KVER_DIR" -name "$m" -printf "%P\n" 2>/dev/null
              done
              # PCI transport before device drivers
              for m in virtio_pci_modern_dev.ko virtio_pci_legacy_dev.ko virtio_pci.ko; do
                find "$KVER_DIR" -name "$m" -printf "%P\n" 2>/dev/null
              done
              # Critical device drivers
              for m in virtio_blk.ko virtio_net.ko virtio_console.ko virtio_input.ko virtio_balloon.ko virtio_mmio.ko; do
                find "$KVER_DIR" -name "$m" -printf "%P\n" 2>/dev/null
              done
              # Everything else
              find "$KVER_DIR" -name "*.ko" -printf "%P\n" | \
                grep -v -E "(virtio\.ko|virtio_ring\.ko|virtio_pci_modern_dev\.ko|virtio_pci_legacy_dev\.ko|virtio_pci\.ko|virtio_blk\.ko|virtio_net\.ko|virtio_console\.ko|virtio_input\.ko|virtio_balloon\.ko|virtio_mmio\.ko)$" | \
                sort
            } > "$KVER_DIR/modules.load"
          fi

          # Show modules.load content
          echo ""
          echo "    modules.load location and content:"
          MODULES_LOAD=$(find work/merged/lib/modules -name "modules.load" | head -1)
          if [ -n "$MODULES_LOAD" ]; then
            echo "    File: $MODULES_LOAD"
            cat "$MODULES_LOAD" | sed 's/^/      /'
          else
            echo "    ⚠️ modules.load NOT FOUND!"
          fi

          # --- Verify ---
          echo ""
          echo ">>> Verification:"
          for critical in virtio_blk.ko virtio_pci.ko; do
            if find work/merged/lib/modules -name "$critical" | grep -q .; then
              echo "    ✅ $critical found"
            else
              echo "    ❌ $critical MISSING"
            fi
          done
          [ -f work/merged/init ] && echo "    ✅ /init (Android first_stage_init)" || echo "    ❌ /init MISSING"
          echo "    Module tree:"
          find work/merged/lib/modules -type d | sed 's/^/      /'

          # --- Step 4: Repack ---
          echo ""
          echo ">>> Step 4: Repacking (format: $REPACK_FORMAT)..."
          cd work/merged
          if [ "$REPACK_FORMAT" = "gzip" ]; then
            fakeroot sh -c 'find . | cpio -o -H newc --quiet' | gzip -9 > ../../merged_ramdisk.img
          else
            fakeroot sh -c 'find . | cpio -o -H newc --quiet' | lz4 -l -12 --favor-decSpeed > ../../merged_ramdisk.img
          fi
          cd ../..

          echo ""
          echo "============================================"
          printf "  %-25s %s bytes\n" "Stock ramdisk:" "$(wc -c < stock_ramdisk.img)"
          printf "  %-25s %s bytes\n" "Built initramfs:" "$(wc -c < kernel_workspace/out/dist/initramfs.img)"
          printf "  %-25s %s bytes\n" "Merged ramdisk:" "$(wc -c < merged_ramdisk.img)"
          printf "  %-25s %s bytes\n" "Kernel (bzImage):" "$(wc -c < kernel_workspace/out/dist/bzImage)"
          echo "============================================"

      - name: Prepare Final Artifacts
        run: |
          mkdir -p final_output

          # Ready-to-deploy files (drop these into your SDK system-images folder)
          cp kernel_workspace/out/dist/bzImage final_output/kernel-ranchu
          cp merged_ramdisk.img final_output/ramdisk.img

          # Raw build artifacts (for debugging)
          cp kernel_workspace/out/dist/bzImage final_output/bzImage
          cp kernel_workspace/out/dist/initramfs.img final_output/initramfs.img

      - name: Upload Finished Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-avd-x86_64-files
          path: final_output/
