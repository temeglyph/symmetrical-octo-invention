name: Build Full AVD x86_64 KernelSU (Android 14)

on:
  workflow_dispatch:
    inputs:
      skip_kernel_build:
        description: 'Skip kernel build (reuse cached artifacts from previous run)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    # Skip this job entirely if we're reusing a previous build
    if: ${{ github.event.inputs.skip_kernel_build != 'true' }}
    steps:
      - name: Save Stock Ramdisk Before Cleanup
        run: |
          echo "=== Searching for stock ramdisk.img in pre-installed Android SDK ==="
          FOUND=""
          for base in "$ANDROID_HOME" "$ANDROID_SDK_ROOT" "/usr/local/lib/android/sdk"; do
            if [ -d "$base/system-images" ]; then
              echo "Searching in: $base/system-images/"
              find "$base/system-images" -name "ramdisk.img" -type f 2>/dev/null | while read f; do
                echo "  Found: $f ($(wc -c < "$f") bytes)"
              done
              for candidate in \
                "$base/system-images/android-34/google_apis/x86_64/ramdisk.img" \
                "$base/system-images/android-34/default/x86_64/ramdisk.img" \
                $(find "$base/system-images" -path "*/x86_64/ramdisk.img" -type f 2>/dev/null | head -3); do
                if [ -f "$candidate" ]; then
                  FOUND="$candidate"
                  break 2
                fi
              done
            fi
          done
          if [ -n "$FOUND" ]; then
            cp "$FOUND" /tmp/stock_ramdisk.img
            echo "✅ Saved stock ramdisk from SDK: $FOUND ($(wc -c < /tmp/stock_ramdisk.img) bytes)"
          else
            echo "⚠️ No stock ramdisk found in pre-installed SDK (will download later)"
          fi

      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y repo git curl bc bison flex libssl-dev libelf-dev cpio lz4 unzip fakeroot

      - name: Initialize & Sync AOSP Kernel
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          git config --global user.name "Builder"
          git config --global user.email "build@example.com"
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
          repo sync -j$(nproc) --no-clone-bundle --no-tags

      - name: Inject Official KernelSU
        run: |
          cd kernel_workspace/common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          sed -i 's/#ifndef X86_FEATURE_INDIRECT_SAFE/#if 0/g' drivers/kernelsu/core/init.c
          sed -i 's/if (!boot_cpu_has(X86_FEATURE_INDIRECT_SAFE))/if (0)/g' drivers/kernelsu/core/init.c

      - name: Compile Native x86_64 Emulator Kernel
        run: |
          cd kernel_workspace
          tools/bazel run //common-modules/virtual-device:virtual_device_x86_64_dist -- --dist_dir=out/dist

      # Upload the raw kernel build as a SEPARATE artifact so it can be reused
      - name: Upload Kernel Build Cache
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-cache
          path: |
            kernel_workspace/out/dist/bzImage
            kernel_workspace/out/dist/initramfs.img
          retention-days: 30

      # Also upload stock ramdisk if we saved one
      - name: Upload Stock Ramdisk Cache
        run: |
          mkdir -p stock_cache
          if [ -f /tmp/stock_ramdisk.img ]; then
            cp /tmp/stock_ramdisk.img stock_cache/
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: stock-ramdisk-cache
          path: stock_cache/
          if-no-files-found: ignore
          retention-days: 30

  # ================================================================
  # JOB 2: Merge ramdisk (runs FAST — uses cached kernel build)
  # ================================================================
  merge-ramdisk:
    runs-on: ubuntu-latest
    needs: build-kernel
    # Always run this job, even if build-kernel was skipped
    if: ${{ always() }}
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cpio lz4 unzip fakeroot kmod

      # Download kernel build artifacts (from this run or previous run)
      - name: Download Kernel Build (Current Run)
        if: ${{ github.event.inputs.skip_kernel_build != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: kernel-build-cache
          path: kernel-build/

      - name: Download Kernel Build (Previous Run)
        if: ${{ github.event.inputs.skip_kernel_build == 'true' }}
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          name: kernel-build-cache
          path: kernel-build/
          search_artifacts: true
          workflow_conclusion: ""

      - name: Verify Kernel Build
        run: |
          echo "=== Kernel Build Artifacts ==="
          ls -la kernel-build/
          if [ ! -f kernel-build/bzImage ] || [ ! -f kernel-build/initramfs.img ]; then
            echo "❌ Missing kernel build artifacts!"
            echo "Run the workflow again with 'Skip kernel build' = false"
            exit 1
          fi
          echo "✅ bzImage: $(wc -c < kernel-build/bzImage) bytes"
          echo "✅ initramfs.img: $(wc -c < kernel-build/initramfs.img) bytes"

      # Download cached stock ramdisk BEFORE we try to use it
      - name: Try Download Stock Ramdisk Cache
        uses: actions/download-artifact@v4
        with:
          name: stock-ramdisk-cache
          path: stock-ramdisk-cache/
        continue-on-error: true

      # Try to get stock ramdisk from cache, then SDK, then download
      - name: Obtain Stock Ramdisk
        run: |
          set -e

          # Try cached stock ramdisk first
          if [ -f stock-ramdisk-cache/stock_ramdisk.img ]; then
            cp stock-ramdisk-cache/stock_ramdisk.img stock_ramdisk.img
            echo "✅ Using cached stock ramdisk: $(wc -c < stock_ramdisk.img) bytes"
            exit 0
          fi

          # Try pre-installed SDK
          for base in "$ANDROID_HOME" "$ANDROID_SDK_ROOT" "/usr/local/lib/android/sdk"; do
            for candidate in \
              "$base/system-images/android-34/google_apis/x86_64/ramdisk.img" \
              "$base/system-images/android-34/default/x86_64/ramdisk.img"; do
              if [ -f "$candidate" ]; then
                cp "$candidate" stock_ramdisk.img
                echo "✅ Using SDK stock ramdisk: $(wc -c < stock_ramdisk.img) bytes"
                exit 0
              fi
            done
          done

          # Download from Google
          echo "Downloading stock ramdisk from Google..."
          mkdir -p stock_work && cd stock_work
          for url in \
            "https://dl.google.com/android/repository/sys-img/google_apis/x86_64-34_r13.zip" \
            "https://dl.google.com/android/repository/sys-img/google_apis/x86_64-34_r12.zip" \
            "https://dl.google.com/android/repository/sys-img/google_apis/x86_64-34_r11.zip"; do
            echo "Trying: $url"
            if curl -fSL -o sysimg.zip "$url" 2>/dev/null; then
              echo "Download successful!"
              break
            fi
          done
          if [ -f sysimg.zip ]; then
            unzip -o sysimg.zip -d extracted/
            STOCK_RAMDISK=$(find extracted/ -name "ramdisk.img" -type f | head -1)
            if [ -n "$STOCK_RAMDISK" ]; then
              cp "$STOCK_RAMDISK" ../stock_ramdisk.img
              echo "✅ Stock ramdisk extracted: $(wc -c < ../stock_ramdisk.img) bytes"
            fi
          fi
          cd ..
          rm -rf stock_work

          if [ ! -f stock_ramdisk.img ]; then
            echo "❌ Could not obtain stock ramdisk!"
            exit 1
          fi

      - name: Merge Kernel Modules into Stock Ramdisk
        run: |

          echo "============================================"
          echo "  Merging custom kernel modules into stock  "
          echo "  Android ramdisk for emulator boot         "
          echo "============================================"
          echo ""

          # --- Step 1: Extract the built initramfs ---
          echo ">>> Step 1: Extracting built initramfs.img..."
          mkdir -p work/built
          cd work/built

          INITRAMFS="../../kernel-build/initramfs.img"
          MAGIC_HEX=$(xxd -l 4 -p "$INITRAMFS")
          echo "    initramfs magic bytes: $MAGIC_HEX"

          if [[ "$MAGIC_HEX" == 04224d18* ]] || [[ "$MAGIC_HEX" == 02214c18* ]]; then
            echo "    Format: LZ4"
            lz4 -dc "$INITRAMFS" | fakeroot cpio -idm --quiet 2>&1 | grep -v "Cannot mknod" || true
          elif [[ "$MAGIC_HEX" == 1f8b* ]]; then
            echo "    Format: gzip"
            gzip -dc "$INITRAMFS" | fakeroot cpio -idm --quiet 2>&1 | grep -v "Cannot mknod" || true
          else
            echo "    Format: unknown, trying lz4..."
            lz4 -dc "$INITRAMFS" 2>/dev/null | fakeroot cpio -idm --quiet 2>/dev/null || true
          fi

          KO_COUNT=$(find . -name "*.ko" | wc -l)
          echo "    Total .ko files: $KO_COUNT"
          if [ "$KO_COUNT" -eq 0 ]; then
            echo "    ❌ No kernel modules in initramfs!"
            exit 1
          fi
          cd ../..

          # --- Step 2: Extract the stock ramdisk ---
          echo ""
          echo ">>> Step 2: Extracting stock ramdisk.img..."
          mkdir -p work/stock
          cd work/stock

          STOCK="../../stock_ramdisk.img"
          STOCK_MAGIC=$(xxd -l 4 -p "$STOCK")
          echo "    Magic bytes: $STOCK_MAGIC"

          REPACK_FORMAT="lz4"
          if [[ "$STOCK_MAGIC" == 04224d18* ]] || [[ "$STOCK_MAGIC" == 02214c18* ]]; then
            lz4 -dc "$STOCK" | fakeroot cpio -idm --quiet 2>&1 | grep -v "Cannot mknod" || true
            REPACK_FORMAT="lz4"
          elif [[ "$STOCK_MAGIC" == 1f8b* ]]; then
            gzip -dc "$STOCK" | fakeroot cpio -idm --quiet 2>&1 | grep -v "Cannot mknod" || true
            REPACK_FORMAT="gzip"
          else
            lz4 -dc "$STOCK" 2>/dev/null | fakeroot cpio -idm --quiet 2>/dev/null || true
          fi

          echo "    /init present: $([ -f init ] && echo 'YES ✅' || echo 'NO ❌')"
          cd ../..

          # --- Step 3: Merge ---
          echo ""
          echo ">>> Step 3: Merging modules into stock ramdisk..."
          mkdir -p work/merged
          cp -a work/stock/. work/merged/

          # Verify stock fstab.ranchu exists (don't overwrite — stock one is correct)
          if [ -f work/merged/first_stage_ramdisk/fstab.ranchu ]; then
            echo "    ✅ Stock fstab.ranchu found in first_stage_ramdisk/ (preserving it)"
          elif [ -f work/merged/fstab.ranchu ]; then
            echo "    ✅ Stock fstab.ranchu found at ramdisk root (preserving it)"
          else
            echo "    ⚠️ No fstab.ranchu found — injecting fallback into first_stage_ramdisk/..."
            mkdir -p work/merged/first_stage_ramdisk
            printf '%s\n' \
               "# Android fstab file." \
               "#<dev>  <mnt_point> <type>  <mnt_flags options> <fs_mgr_flags>" \
               "system   /system     ext4    ro,barrier=1     wait,logical,avb=vbmeta,first_stage_mount" \
               "vendor   /vendor     ext4    ro,barrier=1     wait,logical,first_stage_mount" \
               "product  /product    ext4    ro,barrier=1     wait,logical,first_stage_mount" \
               "system_dlkm /system_dlkm erofs ro wait,logical,first_stage_mount" \
               "system_ext  /system_ext  ext4   ro,barrier=1   wait,logical,first_stage_mount" \
               "/dev/block/vdc   /data     ext4      noatime,nosuid,nodev,nomblk_io_submit,errors=panic   wait,check,quota,fileencryption=aes-256-xts:aes-256-cts,reservedsize=128M,fsverity,keydirectory=/metadata/vold/metadata_encryption,latemount" \
               "/dev/block/pci/pci0000:00/0000:00:06.0/by-name/metadata    /metadata    ext4    noatime,nosuid,nodev    wait,formattable,first_stage_mount" \
               "/devices/*/block/vdf auto   auto      defaults    voldmanaged=sdcard:auto,encryptable=userdata" \
               "/dev/block/zram0 none swap  defaults zramsize=75%" \
               > work/merged/first_stage_ramdisk/fstab.ranchu
          fi

          if [ -d work/built/lib/modules ]; then
            echo "    Copying entire /lib/modules tree (preserving kernel version directory)..."
            mkdir -p work/merged/lib/modules
            cp -a work/built/lib/modules/. work/merged/lib/modules/
            echo "    .ko files: $(find work/merged/lib/modules -name '*.ko' | wc -l)"
          else
            echo "    ⚠️ No /lib/modules in built initramfs, copying flat..."
            mkdir -p work/merged/lib/modules
            find work/built -name "*.ko" -exec cp {} work/merged/lib/modules/ \;
          fi

          KVER_DIR=$(find work/merged/lib/modules -mindepth 1 -maxdepth 1 -type d | head -1)
          echo "    Kernel version dir: $KVER_DIR"

          if [ -n "$KVER_DIR" ]; then
            KVER=$(basename "$KVER_DIR")
            echo "    Running depmod to generate proper module metadata (kernel: $KVER)..."
            depmod -a -b work/merged "$KVER"
            echo "    ✅ depmod completed — generated modules.dep, modules.alias, etc."

            # Verify depmod output
            for f in modules.dep modules.alias modules.symbols; do
              if [ -f "$KVER_DIR/$f" ]; then
                echo "    ✅ $f ($(wc -l < "$KVER_DIR/$f") lines)"
              else
                echo "    ⚠️ $f not generated"
              fi
            done

            # Generate modules.load with proper dependency ordering
            echo "    Generating modules.load with correct load order..."
            {
              for m in virtio.ko virtio_ring.ko virtio_pci_modern_dev.ko \
                       virtio_pci_legacy_dev.ko virtio_pci.ko \
                       virtio_blk.ko virtio_net.ko virtio_console.ko \
                       virtio_input.ko virtio_balloon.ko virtio_mmio.ko \
                       virtio-gpu.ko virtio-rng.ko \
                       goldfish_pipe.ko goldfish_address_space.ko \
                       goldfish_sync.ko goldfish_battery.ko mac80211_hwsim.ko; do
                find "$KVER_DIR" -name "$m" -printf "%P\n" 2>/dev/null
              done
            } > "$KVER_DIR/modules.load"
          fi

          echo ""
          echo "    modules.load:"
          MODULES_LOAD=$(find work/merged/lib/modules -name "modules.load" | head -1)
          [ -n "$MODULES_LOAD" ] && cat "$MODULES_LOAD" | head -15 | sed 's/^/      /' || echo "    ⚠️ NOT FOUND"

          echo ""
          echo ">>> Verification:"
          for critical in virtio_blk.ko virtio_pci.ko; do
            find work/merged/lib/modules -name "$critical" | grep -q . && echo "    ✅ $critical" || echo "    ❌ $critical MISSING"
          done
          [ -f work/merged/init ] && echo "    ✅ /init" || echo "    ❌ /init MISSING"

          # --- Step 4: Repack ---
          echo ""
          echo ">>> Step 4: Repacking (format: $REPACK_FORMAT)..."
          cd work/merged
          if [ "$REPACK_FORMAT" = "gzip" ]; then
            fakeroot sh -c 'find . | cpio -o -H newc --quiet' | gzip -9 > ../../merged_ramdisk.img
          else
            fakeroot sh -c 'find . | cpio -o -H newc --quiet' | lz4 -l -12 --favor-decSpeed > ../../merged_ramdisk.img
          fi
          cd ../..

          echo ""
          echo "============================================"
          printf "  %-25s %s bytes\n" "Stock ramdisk:" "$(wc -c < stock_ramdisk.img)"
          printf "  %-25s %s bytes\n" "Built initramfs:" "$(wc -c < kernel-build/initramfs.img)"
          printf "  %-25s %s bytes\n" "Merged ramdisk:" "$(wc -c < merged_ramdisk.img)"
          printf "  %-25s %s bytes\n" "Kernel (bzImage):" "$(wc -c < kernel-build/bzImage)"
          echo "============================================"

      - name: Prepare Final Artifacts
        run: |
          mkdir -p final_output
          cp kernel-build/bzImage final_output/kernel-ranchu
          cp merged_ramdisk.img final_output/ramdisk.img
          cp kernel-build/bzImage final_output/bzImage
          cp kernel-build/initramfs.img final_output/initramfs.img

      - name: Upload Finished Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-avd-x86_64-files
          path: final_output/
