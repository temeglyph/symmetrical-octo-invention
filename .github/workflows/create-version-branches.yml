name: Build KernelSU LKM

on:
  workflow_dispatch: # This gives you the manual "Run workflow" button in GitHub Actions

permissions:
  contents: write

jobs:
  build-lkm:
    runs-on: ubuntu-latest
    
    # Loads Ylarod's compiler engine pinned precisely to your emulator's KMI
    container:
      image: ghcr.io/ylarod/ddk-min:android14-6.1
      options: --privileged

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch KernelSU Source
        run: |
          git clone https://github.com/tiann/KernelSU.git
          
      - name: Compile Module
        run: |
          cd KernelSU/kernel
          make
          
      - name: Upload Finished Module File
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-lkm-artifact
          path: KernelSU/kernel/kernelsu.ko
