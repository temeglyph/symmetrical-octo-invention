name: Build Full AVD x86_64 KernelSU (Android 14)

on:
  workflow_dispatch:
    inputs:
      skip_kernel_build:
        description: 'Skip kernel build (reuse cached artifacts from previous run)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    # Skip this job entirely if we're reusing a previous build
    if: ${{ github.event.inputs.skip_kernel_build != 'true' }}
    steps:
      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y repo git curl bc bison flex libssl-dev libelf-dev cpio lz4 unzip fakeroot

      - name: Initialize & Sync AOSP Kernel (Pinned to build 9964412)
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          git config --global user.name "Builder"
          git config --global user.email "build@example.com"
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
          
          echo ">>> Downloading pinned manifest for build 9964412..."
          curl -LSs "https://ci.android.com/builds/submitted/9964412/kernel_virt_x86_64/latest/raw/manifest_9964412.xml" -o .repo/manifests/avd-14.xml
          
          echo ">>> Re-initializing repo with pinned manifest..."
          repo init -m avd-14.xml
          
          echo ">>> Syncing exact kernel source..."
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

      - name: Inject KernelSU-Next
        run: |
          cd kernel_workspace/common
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/v3.2.0/kernel/setup.sh" | bash -s v3.2.0

          # --- Fix 1: x86 feature guard (existing) ---
          sed -i 's/#ifndef X86_FEATURE_INDIRECT_SAFE/#if 0/g' drivers/kernelsu/core/init.c
          sed -i 's/if (!boot_cpu_has(X86_FEATURE_INDIRECT_SAFE))/if (0)/g' drivers/kernelsu/core/init.c

          # --- Fix 2: patch_memory.c calls BUG_ON but never includes linux/bug.h ---
          sed -i '1i #include <linux/bug.h>' drivers/kernelsu/hook/x86_64/patch_memory.c

          # --- Fix 3: Disable CONFIG_WERROR globally in the kernel defconfig ---
          sed -i 's/CONFIG_WERROR=y/# CONFIG_WERROR is not set/' arch/x86/configs/gki_defconfig

          # --- Fix 4: Add -Wno-error to Kbuild ---
          for f in drivers/kernelsu/Makefile drivers/kernelsu/Kbuild; do
            if [ -f "$f" ]; then
              sed -i 's/-Werror//g' "$f"
              echo "ccflags-y += -Wno-error -Wno-array-bounds -Wno-implicit-function-declaration" >> "$f"
            fi
          done

          # --- Fix 5: Force correct KSU version in kernel module ---
          # The Bazel build environment breaks Git detection in the Kbuild, causing
          # KSU_VERSION to fall back to 1 and KSU_VERSION_TAG to "v0.0.1".
          # The Manager checks the kernel module version and refuses to work if it's wrong.
          # We force the correct values matching the v3.2.0 release (version code 33129).
          sed -i 's/^\(KSU_VERSION\s*:=\s*\).*$/\133129/' drivers/kernelsu/Kbuild
          sed -i 's/^\(KSU_VERSION_TAG\s*:=\s*\).*$/\1v3.2.0/' drivers/kernelsu/Kbuild

          # --- Fix 6: Force SELinux policy patching from init.rc hook (x86_64 AVD fallback) ---
          # On x86_64 AVD, the execve hook never detects init's second_stage re-exec,
          # so apply_kernelsu_rules() is never called and ksud aborts at boot (exit 6).
          # This patch calls the SELinux setup from the init.rc read path as a fallback.
          sed -i '/pr_info("read init.rc/a \
\tif (!init_second_stage_executed) {\
\t\tpr_info("x86_64 AVD fallback: applying KernelSU rules from init.rc hook\\n");\
\t\tapply_kernelsu_rules();\
\t\tcache_sid();\
\t\tsetup_ksu_cred();\
\t\tinit_second_stage_executed = true;\
\t}' drivers/kernelsu/runtime/ksud_integration.c

      - name: Compile Native x86_64 Emulator Kernel
        run: |
          cd kernel_workspace
          tools/bazel run //common-modules/virtual-device:virtual_device_x86_64_dist -- --dist_dir=out/dist

      - name: Prepare Final Artifact
        run: |
          mkdir -p final_output
          cp kernel_workspace/out/dist/bzImage final_output/kernel-ranchu

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-avd-x86_64-kernel
          path: final_output/
