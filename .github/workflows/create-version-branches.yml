name: Build KernelSU LKM x86_64

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lkm:
    runs-on: ubuntu-latest
    
    # Switched to the explicit x86_64 GKI compiler engine container image
    container:
      image: ghcr.io/ylarod/ddk-min:android14-6.1-x86_64
      options: --privileged

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch KernelSU Source
        run: |
          git clone https://github.com/tiann/KernelSU.git
          
      - name: Compile Module
        run: |
          cd KernelSU/kernel
          # Setting explicit flags for the x86_64 emulator cross-compiler
          export ARCH=x86_64
          export CROSS_COMPILE=x86_64-linux-android-
          CONFIG_KSU=m CC=clang make
          
      - name: Upload Finished Module File
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-x86_64-artifact
          path: KernelSU/kernel/kernelsu.ko
